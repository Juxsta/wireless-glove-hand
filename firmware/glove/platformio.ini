; PlatformIO Project Configuration — Glove (Transmitter)
; Two flex sensors → ESP-NOW → hand receiver.
; Calibration values persist in NVS (Preferences).

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
