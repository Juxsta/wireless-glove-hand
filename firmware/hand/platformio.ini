; PlatformIO Project Configuration — Hand (Receiver + 2-motor controller)
; Receives ESP-NOW joint angles from glove, drives two BLDC motors via
; SimpleFOC `angle_openloop` (no encoder, no current sense). Calibration
; persists in NVS.

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    askuric/Simple FOC@^2.4.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
