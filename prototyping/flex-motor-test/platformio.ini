; Flex sensor (TX) -> ESP-NOW -> Motor open-loop (RX).
; Envs:
;   transmitter             glove side, calibration UI (C0/C90/P)
;   transmitter_demo        glove side, hardcoded calibration, no UI
;   receiver_angle          motor side w/ T/M0/M90/X/P calibration commands
;   receiver_angle_demo     motor side, hardcoded bounds, no UI
;   receiver_velocity       motor side, velocity mode (legacy)

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

[env:transmitter]
build_src_filter = +<transmitter.cpp>

[env:transmitter_demo]
build_src_filter = +<transmitter_demo.cpp>

[env:receiver_velocity]
build_src_filter = +<receiver_velocity.cpp>
lib_deps =
    askuric/Simple FOC@^2.4.0
build_flags =
    -DCORE_DEBUG_LEVEL=3

[env:receiver_angle]
build_src_filter = +<receiver_angle.cpp>
lib_deps =
    askuric/Simple FOC@^2.4.0
build_flags =
    -DCORE_DEBUG_LEVEL=3

[env:receiver_angle_demo]
build_src_filter = +<receiver_angle_demo.cpp>
lib_deps =
    askuric/Simple FOC@^2.4.0
build_flags =
    -DCORE_DEBUG_LEVEL=3
