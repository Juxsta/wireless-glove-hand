; PlatformIO Project Configuration - Motor FOC Test
; DRV8300 (6-PWM) + AS5600 encoder + SimpleFOC

[env:esp32dev]
; pioarduino fork ships arduino-esp32 core 3.x (ESP-IDF v5.x)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    askuric/Simple FOC@^2.3.4

build_flags =
    -DCORE_DEBUG_LEVEL=3

upload_speed = 921600
