; PlatformIO Project Configuration - Motor FOC Test
; DRV8300 (6-PWM) + AS5600 encoder + SimpleFOC

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    askuric/Simple FOC@^2.3.0

build_flags =
    -DCORE_DEBUG_LEVEL=3

upload_speed = 921600
